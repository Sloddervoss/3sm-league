<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Achtergrond -->
  <rect width="1200" height="630" fill="#0F1117"/>

  <!-- Subtiele raster lijnen -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1f2e" stroke-width="1"/>

  <!-- 3 oranje strepen links -->
  <rect x="80" y="180" width="180" height="22" rx="4" fill="#FF6B1A"/>
  <rect x="80" y="216" width="130" height="22" rx="4" fill="#FF6B1A" opacity="0.7"/>
  <rect x="80" y="252" width="180" height="22" rx="4" fill="#FF6B1A" opacity="0.4"/>

  <!-- Verticale oranje lijn als scheiding -->
  <rect x="310" y="160" width="4" height="160" rx="2" fill="#FF6B1A"/>

  <!-- Hoofdtekst -->
  <text x="340" y="260" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" letter-spacing="-2">3 STRIPE</text>
  <text x="340" y="350" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="88" fill="#FF6B1A" letter-spacing="-2">MOTORSPORT</text>

  <!-- Subtitel -->
  <text x="342" y="400" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#8892A4" letter-spacing="6">iRACING LEAGUE</text>

  <!-- Onderlijn -->
  <rect x="80" y="480" width="1040" height="3" rx="1" fill="#FF6B1A" opacity="0.4"/>
  <text x="80" y="520" font-family="Arial, sans-serif" font-size="22" fill="#4a5568" letter-spacing="2">3STRIPEMOTORSPORT.CC</text>
</svg>
